<!DOCTYPE html>
<html>
<head>
<title>PDF to Image Converter</title>
</head>

<body>

<h1>PDF to Image Converter</h1>

<input type="file" id="pdfFile">
<button onclick="convertPDF()">Convert</button>
<button onclick="downloadAll()">Download All Images</button>

<div id="output"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let images = [];

async function convertPDF() {

images = [];
document.getElementById("output").innerHTML = "";

const file = document.getElementById('pdfFile').files[0];

if (!file) {
alert("Please select a PDF file!");
return;
}

const reader = new FileReader();

reader.onload = async function() {

const typedarray = new Uint8Array(this.result);

const pdf = await pdfjsLib.getDocument(typedarray).promise;

for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

const page = await pdf.getPage(pageNum);

const canvas = document.createElement("canvas");
const context = canvas.getContext("2d");

const viewport = page.getViewport({ scale: 1.5 });

canvas.height = viewport.height;
canvas.width = viewport.width;

await page.render({
canvasContext: context,
viewport: viewport
}).promise;

// Save image
const imgData = canvas.toDataURL("image/png");
images.push({data: imgData, name: "page-" + pageNum + ".png"});

// Create container
const container = document.createElement("div");

// Download button per image
const downloadBtn = document.createElement("button");
downloadBtn.innerText = "Download Page " + pageNum;

downloadBtn.onclick = function() {
const link = document.createElement("a");
link.download = "page-" + pageNum + ".png";
link.href = imgData;
link.click();
};

container.appendChild(canvas);
container.appendChild(downloadBtn);

document.getElementById("output").appendChild(container);

}

};

reader.readAsArrayBuffer(file);

}

// DOWNLOAD ALL
function downloadAll() {

if (images.length === 0) {
alert("No images to download!");
return;
}

const zip = new JSZip();

images.forEach(img => {
const base64 = img.data.split(',')[1];
zip.file(img.name, base64, {base64: true});
});

zip.generateAsync({type:"blob"}).then(function(content) {
const link = document.createElement("a");
link.href = URL.createObjectURL(content);
link.download = "pdf-images.zip";
link.click();
});

}
</script>

</body>
</html>
